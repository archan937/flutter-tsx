<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 418" role="img" aria-labelledby="infogram-title infogram-desc">
  <title id="infogram-title">Flutter.tsx — How it works</title>
  <desc id="infogram-desc">Three rows: project surface (src/, config/app.ts, icons/, fonts/, config/theme.ts, config/permissions.ts, locales/, config/links.ts, config/release.ts, config/env.ts, secrets/, legal/) flows through fsx dev engines (TSX→Dart transpiler, flutter_launcher_icons, flutter_native_splash, pubspec.yaml writer, gen-l10n, Info.plist mutator, AndroidManifest mutator, key.properties writer, dart-define injector) into platform artifacts (iOS, Android, Web, macOS, Windows, Linux).</desc>

  <style>
    :root {
      --bg:           #ffffff;
      --ink:          #1f2328;
      --muted:        #636c76;
      --box-bg:       #f6f8fa;
      --box-border:   #d0d7de;
      --chip-bg:      #fefce8;
      --chip-border:  #fbbf24;
      --chip-ink:     #78350f;
      --pill-bg:      #f0fdf4;
      --pill-border:  #4ade80;
      --pill-ink:     #14532d;
      --accent:       #54a4ff;
      --cat-code:     #0ea5e9;
      --cat-identity: #54a4ff;
      --cat-brand:    #a855f7;
      --cat-ux:       #22c55e;
      --cat-comms:    #f97316;
      --cat-config:   #6b7280;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #0d1117;
        --ink:          #e6edf3;
        --muted:        #7d8590;
        --box-bg:       #161b22;
        --box-border:   #30363d;
        --chip-bg:      #1c1500;
        --chip-border:  #b45309;
        --chip-ink:     #fde68a;
        --pill-bg:      #071e12;
        --pill-border:  #15803d;
        --pill-ink:     #86efac;
        --accent:       #54a4ff;
      }
    }
    text { font-family: system-ui, -apple-system, sans-serif; }
    .mono { font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; }
    .row-label { font-size: 10px; fill: var(--muted); letter-spacing: 0.08em; }
    .box-label { font-size: 10.5px; fill: var(--ink); }
    .chip-label { font-size: 9.5px; fill: var(--chip-ink); }
    .pill-label { font-size: 13px; font-weight: 700; fill: var(--pill-ink); }
    .badge-label { font-size: 11px; font-weight: 700; fill: white; letter-spacing: 0.05em; }
    .cat-label { font-size: 9px; fill: var(--muted); letter-spacing: 0.04em; }
  </style>

